<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Livraria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Livraria</h1>

        <div style="margin-bottom: 20px;">
            <a href="/lista" class="btn-link">← Ver Livros Cadastrados</a>
        </div>

        <div class="card">
            <h2 id="form-title">Cadastrar Novo Livro</h2>
            <form id="livro-form">
                <input type="hidden" id="livro-id">
                <div class="form-group">
                    <label>Título:</label>
                    <input type="text" id="titulo" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN:</label>
                        <input type="text" id="isbn" required>
                    </div>
                    <div class="form-group">
                        <label>Preço (R$):</label>
                        <input type="number" id="preco" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Estoque:</label>
                        <input type="number" id="qnt_estque" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Autor:</label>
                        <select id="autor" required>
                            <option value="1">Brandon Sanderson</option>
                            <option value="2">Sarah J. Mass</option>
                            <option value="3">Robin Hobb</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Categoria:</label>
                        <select id="categoria" required>
                            <option value="1">Fantasia</option>
                            <option value="2">Romance</option>
                            <option value="3">Terror</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="btn-salvar">Salvar Livro</button>
                <button type="button" id="btn-cancelar" style="display: none;" onclick="resetarFormulario()">Cancelar Edição</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/livros';

        document.DOMContentLoaded = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('editar');
            if (id) {
                const livroParaEditar = JSON.parse(localStorage.getItem('livro_edicao'));
                if (livroParaEditar) prepararEdicao(livroParaEditar);
            }
        };

        document.getElementById('livro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('livro-id').value;
            const dados = {
                titulo: document.getElementById('titulo').value,
                isbn: document.getElementById('isbn').value,
                preco: parseFloat(document.getElementById('preco').value),
                qnt_estque: parseInt(document.getElementById('qnt_estque').value),
                autor: parseInt(document.getElementById('autor').value),
                categoria: parseInt(document.getElementById('categoria').value)
            };

            const url = id ? `${API_URL}/${id}` : API_URL;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    alert(method === 'POST' ? 'Livro cadastrado com sucesso!' : 'Livro atualizado com sucesso!');
                    localStorage.removeItem('livro_edicao');
                    window.location.href = '/lista'; 
                } else {
                    alert('Erro na operação.');
                }
            } catch (error) {
                alert('Erro ao conectar com o servidor.');
            }
        });

        function prepararEdicao(livro) {
            document.getElementById('form-title').innerText = 'Editar Livro';
            document.getElementById('livro-id').value = livro.id_livros;
            document.getElementById('titulo').value = livro.titulo;
            document.getElementById('isbn').value = livro.isbn;
            document.getElementById('preco').value = livro.preco;
            document.getElementById('qnt_estque').value = livro.qnt_estque;
            document.getElementById('autor').value = livro.autor;
            document.getElementById('categoria').value = livro.categoria;
            document.getElementById('btn-cancelar').style.display = 'inline-block';
        }

        function resetarFormulario() {
            localStorage.removeItem('livro_edicao');
            window.location.href = '/lista';
        }
    </script>
</body>
</html>
